name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        # The pure-logic tests need no browser; Pillow lets the fidelity test
        # run instead of skipping.
        run: python -m pip install --upgrade pip Pillow
      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -v

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install the package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Smoke test (import + console script)
        run: |
          python -c "import gphotos_dl.cli, gphotos_dl.downloader, gphotos_dl.browser, gphotos_dl.lightbox; print('imports OK')"
          gphotos-dl --version
